        .vote-alert {

        .pinned-message {
            background: #e9f0e6;

        .tab-btn {
            flex: 1;
            padding: 12px 8px;

        }

        /* Сайдбар */
        .sidebar {
            position: fixed;
            top: 0;
            right: -100%;
            width: 280px;
            height: 100%;
            background: white;
            box-shadow: -2px 0 10px rgba(0,0,0,0.2);

            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;

            border-radius: 24px;
            width: 300px;
            text-align: center;
        }
        .modal-content input {
            width: 100%;
            padding: 12px;
            margin: 16px 0;
            border: 1px solid #ddd;
            border-radius: 12px;

    .sidebar-overlay {

        width: 100%;

        z-index: 999;
        display: none;

    .sidebar {

    function showRegisterModal() {
    const modal = document.createElement('div');
    modal.className = 'modal';
    modal.style.display = 'flex';
    modal.style.alignItems = 'center';
    modal.style.justifyContent = 'center';
    document.body.appendChild(modal);
    
    let mode = 'login';
    
    function renderModal() {
        if (mode === 'login') {
            modal.innerHTML = `
                <div class="modal-content" style="width: 320px; max-width: 90%; text-align: center;">
                    <h3>🏠 Шверника 15 | Дом Чат</h3>
                    <p style="font-size: 14px; color: #666; margin: 8px 0;">Введите пароль</p>
                    <input type="text" id="loginPassword" placeholder="Пароль" maxlength="5" style="width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 12px;">
                    <button id="loginBtn" style="background: #075e54; color: white; border: none; padding: 12px; border-radius: 24px; width: 100%; margin: 8px 0; cursor: pointer;">Войти</button>
                    <div style="margin-top: 16px;">
                        <span id="switchToRegister" style="color: #075e54; cursor: pointer; font-size: 14px;">✨ Создать профиль</span>
                    </div>
                </div>
            `;
            
            document.getElementById('loginBtn').onclick = async () => {
                const password = document.getElementById('loginPassword').value.trim();
                if (!password) {
                    alert('Введите пароль');
                    return;
                }
                
                const userRef = db.collection("neighbours").doc(password);
                const userDoc = await userRef.get();
                
                if (userDoc.exists) {
                    currentUserId = password;
                    localStorage.setItem("userId", password);
                    modal.remove();
                    loadUserProfile();
                    startChatListener();
                } else {
                    alert('Неверный пароль');
                }
            };
            
            document.getElementById('loginPassword').onkeypress = (e) => {
                if (e.key === 'Enter') {
                    document.getElementById('loginBtn').click();
                }
            };
            
            document.getElementById('switchToRegister').onclick = () => {
                mode = 'register';
                renderModal();
            };
        } else {
            modal.innerHTML = `
                <div class="modal-content" style="width: 320px; max-width: 90%; text-align: center;">
                    <h3>🏠 Шверника 15 | Дом Чат</h3>
                    <input type="text" id="userName" placeholder="Ваше имя (можно изменить)" style="width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 12px;">
                    <div style="display: flex; gap: 8px; margin: 8px 0;">
                        <input type="text" id="userPassword" placeholder="Пароль (5 символов)" maxlength="5" style="flex: 1; padding: 12px; border: 1px solid #ddd; border-radius: 12px;">
                        <button id="generatePasswordBtn" style="background: #667781; color: white; border: none; padding: 0 16px; border-radius: 12px; cursor: pointer;">🎲</button>
                    </div>
                    <button id="registerBtn" style="background: #075e54; color: white; border: none; padding: 12px; border-radius: 24px; width: 100%; margin: 8px 0; cursor: pointer;">Зарегистрироваться</button>
                    <div style="margin-top: 16px;">
                        <span id="switchToLogin" style="color: #667781; cursor: pointer; font-size: 14px;">← Уже есть пароль? Войти</span>
                    </div>
                </div>
            `;
            
            const passwordInput = document.getElementById('userPassword');
            
            document.getElementById('generatePasswordBtn').onclick = () => {
                const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
                let pass = '';
                for (let i = 0; i < 5; i++) {
                    pass += chars[Math.floor(Math.random() * chars.length)];
                }
                passwordInput.value = pass;
            };
            
            document.getElementById('registerBtn').onclick = async () => {
                const name = document.getElementById('userName').value.trim();
                const password = passwordInput.value.trim();
                
                if (!name || !password) {
                    alert('Заполните имя и пароль');
                    return;
                }
                
                if (password.length !== 5) {
                    alert('Пароль должен быть 5 символов');
                    return;
                }
                
                const userRef = db.collection("neighbours").doc(password);
                const userDoc = await userRef.get();
                
                if (userDoc.exists) {
                    alert('Этот пароль уже занят. Придумайте другой.');
                    return;
                }
                
                await userRef.set({
                    name: name,
                    phone: "",
                    flat: "",
                    avatar: "",
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });
                
                // Показываем поздравление с паролем
                modal.innerHTML = `
                    <div class="modal-content" style="width: 320px; max-width: 90%; text-align: center;">
                        <h3>🎉 Добро пожаловать, ${escapeHtml(name)}!</h3>
                        <p style="font-size: 14px; color: #666; margin: 8px 0;">Ваш пароль для входа:</p>
                        <canvas id="finalPasswordCanvas" width="200" height="60" style="display: block; margin: 8px auto; border: 1px solid #ddd; border-radius: 8px; background: white;"></canvas>
                        <button id="downloadFinalBtn" style="background: #075e54; color: white; border: none; padding: 8px 16px; border-radius: 20px; cursor: pointer; font-size: 14px; margin: 8px;">💾 Скачать картинку</button>
                        <button id="enterChatBtn" style="background: #075e54; color: white; border: none; padding: 12px; border-radius: 24px; width: 100%; margin: 8px 0; cursor: pointer;">Войти в чат</button>
                    </div>
                `;
                
                const finalCanvas = document.getElementById('finalPasswordCanvas');
                const ctx = finalCanvas.getContext('2d');
                ctx.fillStyle = '#ffffff';
                ctx.fillRect(0, 0, finalCanvas.width, finalCanvas.height);
                ctx.fillStyle = '#075e54';
                ctx.font = 'bold 24px monospace';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(password, finalCanvas.width / 2, finalCanvas.height / 2);
                
                document.getElementById('downloadFinalBtn').onclick = () => {
                    const link = document.createElement('a');
                    link.download = `dom_chat_password_${password}.png`;
                    link.href = finalCanvas.toDataURL();
                    link.click();
                };
                
                document.getElementById('enterChatBtn').onclick = () => {
                    currentUserId = password;
                    localStorage.setItem("userId", password);
                    modal.remove();
                    loadUserProfile();
                    startChatListener();
                };
            };
            
            document.getElementById('switchToLogin').onclick = () => {
                mode = 'login';
                renderModal();
            };
        }
    }
    
    renderModal();
}

// Загрузка аватара при загрузке профиля
    
    async function loadUserProfile() {
    if(!currentUserId) return;
    const doc = await db.collection("neighbours").doc(currentUserId).get();
    if(doc.exists) {
        currentUserData = doc.data();
        editName.value = currentUserData.name || "";
        editPhone.value = currentUserData.phone || "";
        editFlat.value = currentUserData.flat || "";
        if(currentUserData.avatar) {
            avatarPreview.src = currentUserData.avatar;
            document.getElementById('profileIcon').innerHTML = `<img src="${currentUserData.avatar}" style="width: 32px; height: 32px; border-radius: 50%; object-fit: cover;">`;
        }
    }
}

    async function updateUserProfile(data) {
        await db.collection("neighbours").doc(currentUserId).update(data);
        loadUserProfile();
    }

    function resizeAndEncode(file, callback) {
        const reader = new FileReader();
        reader.onload = (e) => {
            const img = new Image();
            img.onload = () => {
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                const maxWidth = 100;
                const scale = maxWidth / img.width;
                canvas.width = maxWidth;
                canvas.height = img.height * scale;
                ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                callback(canvas.toDataURL('image/jpeg', 0.7));
            };
            img.src = e.target.result;
        };
        reader.readAsDataURL(file);
    }

    avatarInput.onchange = (e) => {
        resizeAndEncode(e.target.files[0], (base64) => {
            avatarPreview.src = base64;
            updateUserProfile({ avatar: base64 });
        });
    };

    saveProfileBtn.onclick = async () => {
        await updateUserProfile({
            name: editName.value,
            phone: editPhone.value,
            flat: editFlat.value
        });
        sidebar.classList.remove('open');
    };

    profileIcon.onclick = () => sidebar.classList.toggle('open');

    // Отправка сообщения
    async function sendMessage() {
    if(!currentUserId) { showRegisterModal(); return; }
    let text = messageInput.value.trim();
    if(!text) return;
    const msgData = {
        userId: currentUserId,
        text: text,
        timestamp: firebase.firestore.FieldValue.serverTimestamp(),
        seenBy: []
    };
    await db.collection("chatcontent").add(msgData);
    messageInput.value = '';
}

// Чат с подтягиванием имён
    
    let unsubscribeChat = null;


    function startChatListener() {
    if (unsubscribeChat) unsubscribeChat();
    
    unsubscribeChat = db.collection("chatcontent")
        .orderBy("timestamp")
        .onSnapshot((snapshot) => {
            snapshot.docChanges().forEach(change => {
                if (change.type === "added") {
                    const msg = change.doc.data();
                    const msgId = change.doc.id;
                    
                    db.collection("neighbours").doc(msg.userId).get().then(userDoc => {
                        const userData = userDoc.exists ? userDoc.data() : { name: "Неизвестный", avatar: "" };
                        const userName = userData.name;
                        const userAvatar = userData.avatar || "";
                        const isSelf = msg.userId === currentUserId;
                        
                        const messageDiv = document.createElement('div');
                        messageDiv.id = `msg-${msgId}`;
                        messageDiv.className = `message ${isSelf ? 'message-self' : 'message-other'}`;
                        
                        // Если своё сообщение — добавляем класс для редактирования
                        if (isSelf) {
                            messageDiv.style.cursor = 'pointer';
                            messageDiv.classList.add('editable-message');
                        }
                        
                        const avatarHtml = userAvatar 
                            ? `<img src="${userAvatar}" style="width: 36px; height: 36px; border-radius: 50%; object-fit: cover; flex-shrink: 0;">`
                            : `<div style="width: 36px; height: 36px; border-radius: 50%; background: #075e54; color: white; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0;">${userName.charAt(0).toUpperCase()}</div>`;
                        
                        const editedMark = msg.edited ? ' <span style="font-size: 10px; color: #667781;">(ред.)</span>' : '';
                        const bubbleContent = `<div class="bubble">${escapeHtml(msg.text || '')}${editedMark}</div>`;
                        
                        const seenCount = msg.seenBy ? msg.seenBy.length : 0;
                        
                        messageDiv.innerHTML = `
                            <div style="display: flex; align-items: flex-start; gap: 8px;">
                                ${avatarHtml}
                                <div style="flex: 1;">
                                    ${bubbleContent}
                                    <div class="msg-info">
                                        <span class="msg-name">${escapeHtml(userName)}</span>
                                        <span>${msg.timestamp ? msg.timestamp.toDate().toLocaleTimeString() : ''}</span>
                                        <button class="seen-btn" data-id="${msgId}">👌 ${seenCount}</button>
                                    </div>
                                </div>
                            </div>
                        `;
                        
                        // Добавляем обработчик клика для редактирования
                        if (isSelf) {
                            const bubbleDiv = messageDiv.querySelector('.bubble');
                            bubbleDiv.onclick = (e) => {
                                e.stopPropagation();
                                openEditPanel(msgId, msg.text || '');
                            };
                        }
                        
                        chatMessages.appendChild(messageDiv);
                        chatMessages.scrollTop = chatMessages.scrollHeight;
                    });
                } else if (change.type === "modified") {
                    const msg = change.doc.data();
                    const msgId = change.doc.id;
                    const seenCount = msg.seenBy ? msg.seenBy.length : 0;
                    const seenBtn = document.querySelector(`#msg-${msgId} .seen-btn`);
                    if (seenBtn) {
                        seenBtn.textContent = `👌 ${seenCount}`;
                    }
                    
                    // Обновляем текст сообщения если оно было отредактировано
                    const messageDiv = document.getElementById(`msg-${msgId}`);
                    if (messageDiv) {
                        const bubbleDiv = messageDiv.querySelector('.bubble');
                        if (bubbleDiv) {
                            const editedMark = msg.edited ? ' <span style="font-size: 10px; color: #667781;">(ред.)</span>' : '';
                            bubbleDiv.innerHTML = escapeHtml(msg.text || '') + editedMark;
                        }
                    }
                }
            });
        });
}

    // Кнопка "видел"
    chatMessages.addEventListener('click', async (e) => {
    if(e.target.classList.contains('seen-btn')) {
        const msgId = e.target.dataset.id;
        const msgRef = db.collection("chatcontent").doc(msgId);
        
        const msgDoc = await msgRef.get();
        const seenBy = msgDoc.data().seenBy || [];
        
        if(seenBy.includes(currentUserId)) {
            // Убираем метку
            const newSeenBy = seenBy.filter(id => id !== currentUserId);
            await msgRef.update({ seenBy: newSeenBy });
            e.target.textContent = `👌 ${newSeenBy.length}`;
        } else {
            // Добавляем метку
            const newSeenBy = [...seenBy, currentUserId];
            await msgRef.update({ seenBy: newSeenBy });
            e.target.textContent = `👌 ${newSeenBy.length}`;
        }
    }
});

// Загрузка списка жильцов
async function loadResidents() {
    const snapshot = await db.collection("neighbours").get();
    const residents = [];
    snapshot.forEach(doc => {
        residents.push({
            id: doc.id,
            name: doc.data().name,
            avatar: doc.data().avatar
        });
    });
    
    document.getElementById('residentsCount').textContent = residents.length;
    
    const container = document.getElementById('residentsList');
    container.innerHTML = residents.map(r => {
        const avatarHtml = r.avatar 
            ? `<img src="${r.avatar}" style="width: 28px; height: 28px; border-radius: 50%; object-fit: cover;">`
            : `<div style="width: 28px; height: 28px; border-radius: 50%; background: rgba(255,255,255,0.3); display: flex; align-items: center; justify-content: center; font-size: 12px;">${r.name.charAt(0).toUpperCase()}</div>`;
        
        return `
            <div style="display: flex; align-items: center; gap: 8px; padding: 6px 0;">
                ${avatarHtml}
                <span>${escapeHtml(r.name)}</span>
            </div>
        `;
    }).join('');
}

        localStorage.removeItem('userId');
        location.reload();

// Удаление аккаунта
document.getElementById('deleteAccountBtn').onclick = async () => {
    if (!confirm('ВНИМАНИЕ! Удалить аккаунт и все ваши сообщения? Отменить нельзя.')) return;
    
    const confirmName = prompt('Введите ваше имя для подтверждения:');
    if (confirmName !== currentUserData?.name) {
        alert('Имя не совпадает. Удаление отменено.');
        return;
    }
    
    try {
        // Удаляем все сообщения пользователя
        const messages = await db.collection('chatcontent').where('userId', '==', currentUserId).get();
        const batch = db.batch();
        messages.forEach(doc => batch.delete(doc.ref));
        await batch.commit();
        
        // Удаляем профиль
        await db.collection('neighbours').doc(currentUserId).delete();
        
        localStorage.removeItem('userId');
        alert('Аккаунт удалён');
        location.reload();
    } catch (error) {
        console.error('Ошибка удаления:', error);
        alert('Ошибка при удалении');
    }
};
</script>
    
<script>
    // Редактирование сообщений
let editingMsgId = null;

const editPanel = document.getElementById('editPanel');
const editMessageInput = document.getElementById('editMessageInput');
const saveEditBtn = document.getElementById('saveEditBtn');
const cancelEditBtn = document.getElementById('cancelEditBtn');

function closeEditPanel() {
    editPanel.style.display = 'none';
    editingMsgId = null;
    editMessageInput.value = '';
}

function openEditPanel(msgId, currentText) {
    editingMsgId = msgId;
    editMessageInput.value = currentText;
    editPanel.style.display = 'block';
    editMessageInput.focus();
}

saveEditBtn.onclick = async () => {
    if (!editingMsgId) return;
    const newText = editMessageInput.value.trim();
    if (!newText) return;
    
    await db.collection("chatcontent").doc(editingMsgId).update({
        text: newText,
        edited: true,
        editedAt: firebase.firestore.FieldValue.serverTimestamp()
    });
    
    closeEditPanel();
};

cancelEditBtn.onclick = closeEditPanel;

</script>
