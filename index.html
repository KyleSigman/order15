        .vote-alert {
            background: #ff9800;
            color: #fff;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            animation: blink 1s infinite;
            cursor: pointer;
        }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }

        /* Закреплённое сообщение */
        .pinned-message {
            background: #e9f0e6;
            padding: 8px 16px;
            font-size: 13px;
            border-left: 4px solid #075e54;
            display: flex;
            gap: 10px;
            align-items: center;
        }
        /* Вкладки */
        .tabs {
            display: flex;
            background: #f0f2f5;
            border-bottom: 1px solid #e0e0e0;
            overflow-x: auto;
        }
        .tab-btn {
            flex: 1;
            padding: 12px 8px;
            background: transparent;
            border: none;
            font-size: 14px;
            font-weight: 500;
            color: #54656f;
            cursor: pointer;
            white-space: nowrap;
        }
        .tab-btn.active {
            color: #075e54;
            border-bottom: 3px solid #075e54;
            background: white;
        }
        .content {
            flex: 1;
            overflow-y: auto;
            background: #f0f2f5;
        }
        .tab-pane {
            display: none;
            height: 100%;
            flex-direction: column;
        }
        .tab-pane.active {
            display: flex;
        }

        /* Чат */
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .message {
            display: flex;
            flex-direction: column;
            max-width: 100%;
        }
        .message-self {
    align-self: flex-start;
}
.message-other {
    align-self: flex-end;
}

        .bubble {
            padding: 8px 12px;
            border-radius: 18px;
            background: white;
            box-shadow: 0 1px 1px rgba(0,0,0,0.08);
            word-break: break-word;
        }
        .message-self .bubble {
            background: #dcf8c6;
            border-bottom-right-radius: 4px;
        }
        .message-other .bubble {
            background: white;
            border-bottom-left-radius: 4px;
        }
        .msg-info {
            display: flex;
            align-items: baseline;
            gap: 8px;
            font-size: 11px;
            color: #667781;
            margin-top: 4px;
            padding: 0 8px;
        }
        .message-self .msg-info {
            justify-content: flex-end;
        }
        .seen-btn {
            background: none;
            border: none;
            font-size: 12px;
            cursor: pointer;
            color: #667781;
            margin-left: 8px;
        }
        audio {
            max-width: 200px;
            height: 36px;
        }
        .chat-input-area {
            background: white;
            padding: 10px 12px;
            border-top: 1px solid #e9edef;
        }
        .input-row {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .attach-btn, .emoji-btn {
            background: #f0f2f5;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            font-size: 20px;
            cursor: pointer;
        }
        .message-input-wrapper {
            flex: 1;
            background: #f0f2f5;
            border-radius: 24px;
            padding: 8px 16px;
        }
        #messageInput {
            width: 100%;
            border: none;
            background: transparent;
            outline: none;
            font-size: 15px;
        }
        .send-btn {
            background: #075e54;
            border: none;
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            font-size: 18px;
            cursor: pointer;
        }
        .emoji-picker {
            display: none;
            gap: 8px;
            flex-wrap: wrap;
            background: #fff;
            border-radius: 20px;
            padding: 10px;
            margin-bottom: 8px;
        }
        .emoji-picker.show {
            display: flex;
        }
        .emoji-item {
            font-size: 24px;
            cursor: pointer;
        }

        /* Сайдбар */
        .sidebar {
            position: fixed;
            top: 0;
            right: -100%;
            width: 280px;
            height: 100%;
            background: white;
            box-shadow: -2px 0 10px rgba(0,0,0,0.2);
            transition: 0.3s;
            padding: 20px;
            z-index: 1000;
        }
        .sidebar.open {
            right: 0;
        }
        .sidebar input {
            width: 100%;
            padding: 8px;
            margin: 8px 0;
            border: 1px solid #ddd;
            border-radius: 12px;
        }
        .sidebar button {
            background: #075e54;
            color: white;
            border: none;
            padding: 8px;
            border-radius: 12px;
            width: 100%;
            margin-top: 10px;
        }
        .avatar-preview {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            object-fit: cover;
            margin: 10px auto;
            display: block;
        }

        /* Модалка регистрации */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }
        .modal-content {
            background: white;
            padding: 24px;
            border-radius: 24px;
            width: 300px;
            text-align: center;
        }
        .modal-content input {
            width: 100%;
            padding: 12px;
            margin: 16px 0;
            border: 1px solid #ddd;
            border-radius: 12px;
        }

        @media (max-width: 600px) {
    .sidebar {
        width: 100%;
        max-width: 320px;
    }
    
    .sidebar-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0,0,0,0.5);
        z-index: 999;
        display: none;
    }
    
    .sidebar-overlay.show {
        display: block;
    }
    
    .sidebar {
        z-index: 1000;
    }
}
    </style>

                    <button id="loginBtn" style="background: #075e54; color: white; border: none; padding: 12px; border-radius: 24px; width: 100%; margin: 8px 0; cursor: pointer; font-weight: 600;">Войти</button>
                    
                    <div style="margin-top: 20px; padding-top: 16px; border-top: 1px solid #e9edef;">
                        <p style="font-size: 13px; color: #667781; margin-bottom: 8px;">✨ Впервые здесь?</p>
                        <button id="switchToRegister" style="background: transparent; border: 1px solid #075e54; color: #075e54; padding: 10px 16px; border-radius: 24px; width: 100%; cursor: pointer; font-weight: 500;">Создать профиль</button>
                    </div>
                </div>
            `;
            
            document.getElementById('loginBtn').onclick = async () => {
                const password = document.getElementById('loginPassword').value.trim().toUpperCase();
                if (!password) {
                    alert('Введите пароль');
                    return;
                }
                
                if (password.length !== 5) {
                    alert('Пароль должен быть 5 символов');
                    return;
                }
                
                const userRef = db.collection("neighbours").doc(password);
                const userDoc = await userRef.get();
                
                if (userDoc.exists) {
                    currentUserId = password;
                    localStorage.setItem("userId", password);
                    modal.remove();
                    loadUserProfile();
                    checkVipAccess().then(() => {
                        startChatListener();
                    });
                } else {
                    alert('Неверный пароль');
                }
            };
            
            document.getElementById('loginPassword').onkeypress = (e) => {
                if (e.key === 'Enter') {
                    document.getElementById('loginBtn').click();
                }
            };
            
            document.getElementById('switchToRegister').onclick = () => {
                mode = 'register';
                renderModal();
            };
        } else {
            modal.innerHTML = `
                <div class="modal-content" style="width: 320px; max-width: 90%; text-align: center;">
                    <h3>🏠 Шверника 15 | Дом Чат</h3>
                    
                    <div style="background: #e9f0e6; padding: 12px; border-radius: 12px; margin: 12px 0;">
                        <div style="font-weight: 600; margin-bottom: 6px;">🎲 Как получить пароль?</div>
                        <div style="font-size: 12px; color: #1f2f36;">1. Введите ваше имя</div>

                    <div style="margin-top: 16px;">
                        <span id="switchToLogin" style="color: #667781; cursor: pointer; font-size: 14px;">← Уже есть пароль? Войти</span>
                    </div>
                </div>
            `;
            
            const passwordInput = document.getElementById('userPassword');
            
            document.getElementById('generatePasswordBtn').onclick = () => {
                const newPass = generatePassword();
                passwordInput.value = newPass;
                passwordInput.style.background = '#e9f0e6';
                setTimeout(() => { passwordInput.style.background = '#f9f9f9'; }, 200);
            };
            
            document.getElementById('registerBtn').onclick = async () => {
                const name = document.getElementById('userName').value.trim();
                const password = passwordInput.value.trim();
                
                if (!name) {
                    alert('Введите имя');
                    document.getElementById('userName').focus();
                    return;
                }
                
                if (!password || password.length !== 5) {
                    alert('Нажмите 🎲, чтобы сгенерировать пароль');
                    return;
                }
                
                const userRef = db.collection("neighbours").doc(password);
                const userDoc = await userRef.get();
                
                if (userDoc.exists) {
                    alert('Этот пароль уже занят. Нажмите 🎲 для генерации нового');
                    passwordInput.value = '';
                    return;
                }
                
                await userRef.set({
                    name: name,
                    phone: "",
                    flat: "",
                    avatar: "",
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });
                
                modal.innerHTML = `
                    <div class="modal-content" style="width: 320px; max-width: 90%; text-align: center;">
                        <h3>🎉 Добро пожаловать, ${escapeHtml(name)}!</h3>
                        <p style="font-size: 14px; color: #666; margin: 8px 0;">Ваш пароль для входа:</p>
                        <div style="background: #075e54; color: white; padding: 16px; border-radius: 16px; margin: 12px 0; font-family: monospace; font-size: 28px; letter-spacing: 6px;">${escapeHtml(password)}</div>
                        <canvas id="finalPasswordCanvas" width="200" height="60" style="display: none;"></canvas>
                        <button id="downloadFinalBtn" style="background: #667781; color: white; border: none; padding: 8px 16px; border-radius: 20px; cursor: pointer; font-size: 14px; margin: 8px;">💾 Скачать картинку</button>
                        <button id="enterChatBtn" style="background: #075e54; color: white; border: none; padding: 12px; border-radius: 24px; width: 100%; margin: 8px 0; cursor: pointer;">Войти в чат</button>

                    </div>
                `;
                
                const finalCanvas = document.getElementById('finalPasswordCanvas');
                const ctx = finalCanvas.getContext('2d');
                ctx.fillStyle = '#ffffff';
                ctx.fillRect(0, 0, finalCanvas.width, finalCanvas.height);
                ctx.fillStyle = '#075e54';
                ctx.font = 'bold 24px monospace';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(password, finalCanvas.width / 2, finalCanvas.height / 2);
                
                document.getElementById('downloadFinalBtn').onclick = () => {
                    const link = document.createElement('a');
                    link.download = `dom_chat_password_${password}.png`;
                    link.href = finalCanvas.toDataURL();
                    link.click();
                };
                
                document.getElementById('enterChatBtn').onclick = () => {
                    currentUserId = password;
                    localStorage.setItem("userId", password);
                    modal.remove();
                    loadUserProfile();
                    checkVipAccess().then(() => {
                        startChatListener();
                    });
                };
            };
            
            document.getElementById('switchToLogin').onclick = () => {
                mode = 'login';
                renderModal();
            };
        }
    }
    
    renderModal();
}

// Загрузка аватара при загрузке профиля
    
    async function loadUserProfile() {
    if(!currentUserId) return;
    const doc = await db.collection("neighbours").doc(currentUserId).get();
    if(doc.exists) {
        currentUserData = doc.data();
        editName.value = currentUserData.name || "";
        editPhone.value = currentUserData.phone || "";
        editFlat.value = currentUserData.flat || "";
        if(currentUserData.avatar) {
            avatarPreview.src = currentUserData.avatar;
            document.getElementById('profileIcon').innerHTML = `<img src="${currentUserData.avatar}" style="width: 32px; height: 32px; border-radius: 50%; object-fit: cover;">`;
        }
    }
}

    async function updateUserProfile(data) {
        await db.collection("neighbours").doc(currentUserId).update(data);
        loadUserProfile();
    }

    function resizeAndEncode(file, callback) {
        const reader = new FileReader();
        reader.onload = (e) => {
            const img = new Image();
            img.onload = () => {
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                const maxWidth = 100;
                const scale = maxWidth / img.width;
                canvas.width = maxWidth;
                canvas.height = img.height * scale;
                ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                callback(canvas.toDataURL('image/jpeg', 0.7));
            };
            img.src = e.target.result;
        };
        reader.readAsDataURL(file);
    }

    avatarInput.onchange = (e) => {
        resizeAndEncode(e.target.files[0], (base64) => {
            avatarPreview.src = base64;
            updateUserProfile({ avatar: base64 });
        });
    };

    saveProfileBtn.onclick = async () => {
        await updateUserProfile({
            name: editName.value,
            phone: editPhone.value,
            flat: editFlat.value
        });
        sidebar.classList.remove('open');
    };

    profileIcon.onclick = () => sidebar.classList.toggle('open');

    // НОВЫЕ ФУНКЦИИ ДЛЯ VIP
    async function activateVipAccess() {
        if (userHasVip) return;
        userHasVip = true;
        await db.collection("neighbours").doc(currentUserId).update({ vip: true });
        const selector = document.getElementById('roomSelector');
        if (selector) selector.style.display = 'flex';
        // alert('⭐ Доступ к VIP комнате открыт!');
    }

    async function checkVipAccess() {
        if (!currentUserId) return;
        const doc = await db.collection("neighbours").doc(currentUserId).get();
        userHasVip = doc.data()?.vip === true;
        const selector = document.getElementById('roomSelector');
        if (selector) selector.style.display = userHasVip ? 'flex' : 'none';
    }
    
    // Отправка сообщения (МОДИФИЦИРОВАНА)
    async function sendMessage() {
        if(!currentUserId) { showRegisterModal(); return; }
        let text = messageInput.value.trim();
        if(!text) return;
        
        // Проверка команды для VIP
        if (text === '@@@viproom') {
            activateVipAccess();
            messageInput.value = '';
            return;
        }
        
        const collection = currentRoom === 'main' ? 'chatcontent' : 'viproom';
        const msgData = {
            userId: currentUserId,
            text: text,
            timestamp: firebase.firestore.FieldValue.serverTimestamp(),
            seenBy: []
        };
        await db.collection(collection).add(msgData);
        messageInput.value = '';
    }

    // Чат с подтягиванием имён (МОДИФИЦИРОВАН)
    function startChatListener() {
        if (currentUnsubscribe) currentUnsubscribe();
        
        const collection = currentRoom === 'main' ? 'chatcontent' : 'viproom';
        
        currentUnsubscribe = db.collection(collection)
            .orderBy("timestamp")
            .onSnapshot((snapshot) => {
                snapshot.docChanges().forEach(change => {
                    if (change.type === "added") {
                        const msg = change.doc.data();
                        const msgId = change.doc.id;
                        
                        db.collection("neighbours").doc(msg.userId).get().then(userDoc => {
                            const userData = userDoc.exists ? userDoc.data() : { name: "Неизвестный", avatar: "" };
                            const userName = userData.name;
                            const userAvatar = userData.avatar || "";
                            const isSelf = msg.userId === currentUserId;
                            
                            const messageDiv = document.createElement('div');
                            messageDiv.id = `msg-${msgId}`;
                            messageDiv.className = `message ${isSelf ? 'message-self' : 'message-other'}`;
                            
                            if (isSelf) {
                                messageDiv.style.cursor = 'pointer';
                                messageDiv.classList.add('editable-message');
                            }
                            
                            const avatarHtml = userAvatar 
                                ? `<img src="${userAvatar}" style="width: 36px; height: 36px; border-radius: 50%; object-fit: cover; flex-shrink: 0;">`
                                : `<div style="width: 36px; height: 36px; border-radius: 50%; background: #075e54; color: white; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0;">${userName.charAt(0).toUpperCase()}</div>`;
                            
                            const editedMark = msg.edited ? ' <span style="font-size: 10px; color: #667781;">(ред.)</span>' : '';
                            const bubbleContent = `<div class="bubble">${escapeHtml(msg.text || '')}${editedMark}</div>`;
                            
                            const seenCount = msg.seenBy ? msg.seenBy.length : 0;
                            
                            messageDiv.innerHTML = `
                                <div style="display: flex; align-items: flex-start; gap: 8px;">
                                    ${avatarHtml}
                                    <div style="flex: 1;">
                                        ${bubbleContent}
                                        <div class="msg-info">
                                            <span class="msg-name">${escapeHtml(userName)}</span>
                                            <span>${msg.timestamp ? msg.timestamp.toDate().toLocaleTimeString() : ''}</span>
                                            <button class="seen-btn" data-id="${msgId}" data-col="${collection}">👌 ${seenCount}</button>
                                        </div>
                                    </div>
                                </div>
                            `;
                            
                            if (isSelf) {
                                const bubbleDiv = messageDiv.querySelector('.bubble');
                                bubbleDiv.onclick = (e) => {
                                    e.stopPropagation();
                                    openEditPanel(msgId, msg.text || '');
                                };
                            }
                            
                            chatMessages.appendChild(messageDiv);
                            chatMessages.scrollTop = chatMessages.scrollHeight;
                        });
                    } else if (change.type === "modified") {
                        const msg = change.doc.data();
                        const msgId = change.doc.id;
                        const seenCount = msg.seenBy ? msg.seenBy.length : 0;
                        const seenBtn = document.querySelector(`#msg-${msgId} .seen-btn`);
                        if (seenBtn) {
                            seenBtn.textContent = `👌 ${seenCount}`;
                        }
                        const messageDiv = document.getElementById(`msg-${msgId}`);
                        if (messageDiv) {
                            const bubbleDiv = messageDiv.querySelector('.bubble');
                            if (bubbleDiv) {
                                const editedMark = msg.edited ? ' <span style="font-size: 10px; color: #667781;">(ред.)</span>' : '';
                                bubbleDiv.innerHTML = escapeHtml(msg.text || '') + editedMark;
                            }
                        }
                    }
                });
            });
    }

    // Кнопка "видел" (МОДИФИЦИРОВАН)
    chatMessages.addEventListener('click', async (e) => {
        if(e.target.classList.contains('seen-btn')) {
            const msgId = e.target.dataset.id;
            const collectionName = e.target.dataset.col;
            const msgRef = db.collection(collectionName).doc(msgId);
            
            const msgDoc = await msgRef.get();
            const seenBy = msgDoc.data().seenBy || [];
            
            if(seenBy.includes(currentUserId)) {
                const newSeenBy = seenBy.filter(id => id !== currentUserId);
                await msgRef.update({ seenBy: newSeenBy });
                e.target.textContent = `👌 ${newSeenBy.length}`;
            } else {
                const newSeenBy = [...seenBy, currentUserId];
                await msgRef.update({ seenBy: newSeenBy });
                e.target.textContent = `👌 ${newSeenBy.length}`;
            }
        }
    });

    // Загрузка списка жильцов
    async function loadResidents() {
        const snapshot = await db.collection("neighbours").get();
        const residents = [];
        snapshot.forEach(doc => {
            residents.push({
                id: doc.id,
                name: doc.data().name,
                avatar: doc.data().avatar
            });
        });
        
        document.getElementById('residentsCount').textContent = residents.length;
        
        const container = document.getElementById('residentsList');
        container.innerHTML = residents.map(r => {
            const avatarHtml = r.avatar 
                ? `<img src="${r.avatar}" style="width: 28px; height: 28px; border-radius: 50%; object-fit: cover;">`
                : `<div style="width: 28px; height: 28px; border-radius: 50%; background: rgba(255,255,255,0.3); display: flex; align-items: center; justify-content: center; font-size: 12px;">${r.name.charAt(0).toUpperCase()}</div>`;
            
            return `
                <div style="display: flex; align-items: center; gap: 8px; padding: 6px 0;">
                    ${avatarHtml}
                    <span>${escapeHtml(r.name)}</span>
                </div>
            `;
        }).join('');
    }

    // Клик по строке с количеством жильцов
    let expanded = false;
    document.getElementById('residentsPreview').onclick = (e) => {
        e.stopPropagation();
        expanded = !expanded;
        const list = document.getElementById('residentsList');
        const header = document.getElementById('header');
        
        if (expanded) {
            list.style.display = 'block';
            header.classList.add('expanded');
            loadResidents();
        } else {
            list.style.display = 'none';
            header.classList.remove('expanded');
        }
    };

    function loadAnnouncements() {
        const container = document.getElementById('announcementsList');
        container.innerHTML = `
            <div class="card" style="background: #e9f0e6; border-left: 4px solid #075e54; padding: 15px">
                <div class="card-title">Объявление.</div> <br>
                <div>Пожалуйста не теряйте пароль, если он был автоматчиески сгенерирован при регистрации. <br> <br> Спасибо.</div>
            </div>
        `;
    }

    // Загрузка обращений
function loadComplaints() {
    db.collection("complaints")
        .orderBy("timestamp", "desc")
        .onSnapshot(snapshot => {
            const container = document.getElementById('complaintsList');
            if (!container) return;
            
            container.innerHTML = '';
            let totalCount = 0;
            
            snapshot.forEach(doc => {
                const c = doc.data();
                totalCount++;
                
                if (c.isAnonymous) {
                    // Анонимное обращение
                    const date = c.timestamp ? c.timestamp.toDate().toLocaleString() : '';
                    container.innerHTML += `
                        <div style="background: #f5f5f5; border-radius: 12px; padding: 12px; border-left: 4px solid #667781;">
                            <div style="display: flex; justify-content: space-between; align-items: center;">
                                <span style="font-size: 13px; color: #667781;">🔒 Анонимное обращение</span>
                                <span style="font-size: 11px; color: #aaa;">${date}</span>
                            </div>
                            <div style="margin-top: 8px; font-size: 14px;">+1 обращение</div>
                        </div>
                    `;
                } else {
                    // Публичное обращение
                    const date = c.timestamp ? c.timestamp.toDate().toLocaleString() : '';
                    const flatInfo = c.flat ? `, кв. ${c.flat}` : '';
                    container.innerHTML += `
                        <div style="background: white; border-radius: 12px; padding: 12px; border: 1px solid #e9edef;">
                            <div style="display: flex; justify-content: space-between; margin-bottom: 8px;">
                                <span style="font-weight: 600; color: #075e54;">${escapeHtml(c.userName)}${flatInfo}</span>
                                <span style="font-size: 11px; color: #aaa;">${date}</span>
                            </div>
                            <div style="font-size: 14px; line-height: 1.4;">${escapeHtml(c.text)}</div>
                        </div>
                    `;
                }
            });
            
            document.getElementById('complaintsCount').innerHTML = `📊 Всего обращений: ${totalCount}`;
        });
}

// Отправка обращения
document.getElementById('submitComplaintBtn')?.addEventListener('click', async () => {
    const text = document.getElementById('complaintText').value.trim();
    if (!text) {
        alert('Напишите текст обращения');
        return;
    }
    
    const isAnonymous = document.querySelector('input[name="complaintType"]:checked').value === 'anonymous';
    const flat = document.getElementById('complaintFlat').value.trim();
    
    const complaintData = {
        text: text,
        isAnonymous: isAnonymous,
        flat: flat || "",
        timestamp: firebase.firestore.FieldValue.serverTimestamp(),
        userId: currentUserId
    };
    
    if (!isAnonymous) {
        complaintData.userName = currentUserData?.name || "Житель";
    }
    
    await db.collection("complaints").add(complaintData);
    
    // Очистка формы
    document.getElementById('complaintText').value = '';
    document.getElementById('complaintFlat').value = '';
    document.querySelector('input[name="complaintType"][value="public"]').checked = true;
});

    //             `;

    // }
    
    // Обработка "видел" для объявлений и анекдотов
    document.getElementById('announcementsList')?.addEventListener('click', async (e) => {
        if(e.target.classList.contains('seen-btn')) {
            const id = e.target.dataset.id;
            const ref = db.collection(e.target.dataset.col).doc(id);
            const doc = await ref.get();
            const seenBy = doc.data().seenBy || [];
            if(!seenBy.includes(currentUserId)) {
                seenBy.push(currentUserId);
                await ref.update({ seenBy });
            }
        }
    });
    
    document.getElementById('jokesList')?.addEventListener('click', async (e) => {
        if(e.target.classList.contains('seen-btn')) {
            const id = e.target.dataset.id;
            const ref = db.collection(e.target.dataset.col).doc(id);
            const doc = await ref.get();
            const seenBy = doc.data().seenBy || [];
            if(!seenBy.includes(currentUserId)) {
                seenBy.push(currentUserId);
                await ref.update({ seenBy });
            }
        }
    });

    function escapeHtml(str) { return str?.replace(/[&<>]/g, function(m){if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}) || ''; }

    // Вкладки
    document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.onclick = () => {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById(btn.dataset.tab).classList.add('active');
        };
    });

    emojiToggleBtn.onclick = () => emojiPickerDiv.classList.toggle('show');
    sendBtn.onclick = sendMessage;
    messageInput.onkeypress = (e) => { if(e.key === 'Enter') sendMessage(); };

    // Редактирование сообщений (МОДИФИЦИРОВАНО)
    let editingMsgId = null;
    let editingCollection = null;

    const editPanel = document.getElementById('editPanel');
    const editMessageInput = document.getElementById('editMessageInput');
    const saveEditBtn = document.getElementById('saveEditBtn');
    const cancelEditBtn = document.getElementById('cancelEditBtn');

    function closeEditPanel() {
        editPanel.style.display = 'none';
        editingMsgId = null;
        editingCollection = null;
        editMessageInput.value = '';
    }

    function openEditPanel(msgId, currentText) {
        editingMsgId = msgId;
        editingCollection = currentRoom === 'main' ? 'chatcontent' : 'viproom';
        editMessageInput.value = currentText;
        editPanel.style.display = 'block';
        editMessageInput.focus();
    }

    saveEditBtn.onclick = async () => {
        if (!editingMsgId || !editingCollection) return;
        const newText = editMessageInput.value.trim();
        if (!newText) return;
        
        await db.collection(editingCollection).doc(editingMsgId).update({
            text: newText,
            edited: true,
            editedAt: firebase.firestore.FieldValue.serverTimestamp()
        });
        
        closeEditPanel();
    };

    cancelEditBtn.onclick = closeEditPanel;

    document.getElementById('deleteMsgBtn').onclick = async () => {
    if (!editingMsgId) return;
    
    const confirmed = confirm('Удалить сообщение? Отменить нельзя.');
    if (!confirmed) return;
    
    const collectionName = editingCollection || (currentRoom === 'main' ? 'chatcontent' : 'viproom');
    await db.collection(collectionName).doc(editingMsgId).delete();
    
    // Удаляем сообщение из DOM сразу
    const msgElement = document.getElementById(`msg-${editingMsgId}`);
    if (msgElement) {
        msgElement.remove();
    }
    
    closeEditPanel();
};

//     await db.collection(collectionName).doc(editingMsgId).delete();
    
//     closeEditPanel();
// };
    
    // Функция переключения комнат
    function switchRoom(room) {
        if (currentRoom === room) return;
        currentRoom = room;
        document.getElementById('chatMessages').innerHTML = '';
        if (currentUnsubscribe) {
            currentUnsubscribe();
            currentUnsubscribe = null;
        }
        startChatListener();
        const mainBtn = document.getElementById('mainRoomBtn');
        const vipBtn = document.getElementById('vipRoomBtn');
        if (mainBtn) mainBtn.classList.toggle('active', room === 'main');
        if (vipBtn) vipBtn.classList.toggle('active', room === 'vip');
    }

    // Логаут
    document.getElementById('logoutBtn').onclick = () => {
        if (confirm('Выйти из аккаунта?')) {
            localStorage.removeItem('userId');
            location.reload();
        }
    };

    // Удаление аккаунта
    document.getElementById('deleteAccountBtn').onclick = async () => {
        if (!confirm('ВНИМАНИЕ! Удалить аккаунт и все ваши сообщения? Отменить нельзя.')) return;
        
        const confirmName = prompt('Введите ваше имя для подтверждения:');
        if (confirmName !== currentUserData?.name) {
            alert('Имя не совпадает. Удаление отменено.');
            return;
        }
        
        try {
            const messages = await db.collection('chatcontent').where('userId', '==', currentUserId).get();
            const vipMessages = await db.collection('viproom').where('userId', '==', currentUserId).get();
            const batch = db.batch();
            messages.forEach(doc => batch.delete(doc.ref));
            vipMessages.forEach(doc => batch.delete(doc.ref));
            await batch.commit();
            
            await db.collection('neighbours').doc(currentUserId).delete();
            
            localStorage.removeItem('userId');
            alert('Аккаунт удалён');
            location.reload();
        } catch (error) {
            console.error('Ошибка удаления:', error);
            alert('Ошибка при удалении');
        }
    };
    
    document.getElementById('closeSidebarBtn').onclick = () => {
        sidebar.classList.remove('open');
    };

    // ИНИЦИАЛИЗАЦИЯ (МОДИФИЦИРОВАНА)
    if(!currentUserId) {
        showRegisterModal();
    } else {
        loadUserProfile();
        checkVipAccess().then(() => {
            startChatListener();
        });
    }
    loadAnnouncements();
    loadResidents();
    loadComplaints();
    // loadJokes();

    document.getElementById('mainRoomBtn')?.addEventListener('click', () => switchRoom('main'));
    document.getElementById('vipRoomBtn')?.addEventListener('click', () => switchRoom('vip'));

</script>
